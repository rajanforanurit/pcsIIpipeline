name: Trigger auto deployment for pcspipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.PCSPIPELINE_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.PCSPIPELINE_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PCSPIPELINE_AZURE_SUBSCRIPTION_ID }}

      - name: Build and Deploy Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}

          dockerfilePath: Dockerfile

          registryUrl: pcspipeline.azurecr.io
          registryUsername: ${{ secrets.PCSPIPELINE_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.PCSPIPELINE_REGISTRY_PASSWORD }}

          imageToBuild: pcspipeline.azurecr.io/pcspipeline:${{ github.sha }}

          containerAppName: pcspipeline
          resourceGroup: Anurit_RG
